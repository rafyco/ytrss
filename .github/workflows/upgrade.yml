---
name: Package upgrade

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "docs/"
      - ".github/"
      - "*.rst"
  workflow_dispatch:
    inputs:
      upgrade-type:
        type: choice
        description: Upgrade type
        options:
          - patch
          - minor
          - major
        default:

permissions:
  contents: write

jobs:
  CI-upgrade:
    runs-on: ubuntu-latest
    outputs:
      git_tag: ${{ steps.vars.outputs.git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: |
          pip install uv
          uv sync

      - name: Upgrade version
        id: vars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_VERSION=$(uv pip show ytrss | awk '/Version:/ {print $2}')
         
          MAJOR=$(echo -e -n "${OLD_VERSION}" | sed 's/\([0-9]*\)\.[0-9]*\.[0-9]*/\1/gp;d')
          MINOR=$(echo "${OLD_VERSION}" | sed 's/[0-9]*\.\([0-9]*\)\.[0-9]*/\1/gp;d')
          PATCH=$(echo "${OLD_VERSION}" | sed 's/[0-9]*\.[0-9]*\.\([0-9]*\)/\1/gp;d')
          
          case "${{ inputs.upgrade-type }}" in
            "major" )
              NEW_MAJOR=$(( MAJOR + 1 ))
              NEW_VERSION="$NEW_MAJOR.0.0"
               ;;
            "minor" )
              NEW_MINOR=$(( MINOR + 1 ))
              NEW_VERSION="$MAJOR.$NEW_MINOR.0"
               ;;
            "patch" | * )
              NEW_PATCH=$(( PATCH + 1 ))
              NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
              ;;
          esac
          
          sed -i "s/version = \"${OLD_VERSION}\"/version = \"${NEW_VERSION}\"/g" pyproject.toml
          
          echo "git_tag=${NEW_VERSION}" >> $GITHUB_OUTPUT
      - name: Build Package
        run: uv build
      - name: Commit massage
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          export GIT_TAG=${{ steps.vars.outputs.git_tag }}
          git commit -a -m "release: Upgrade to ${GIT_TAG} version"
          git tag v${GIT_TAG} -a -m "Upgrade to ${GIT_TAG} version"
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytrss-package
          path: dist/
          retention-days: 1

  PyPi-deploy:
    runs-on: ubuntu-latest
    needs: [CI-upgrade]
    environment:
      name: pypi
      url: https://pypi.org/project/ytrss/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ytrss-package
          path: dist/
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  Docker-deploy:
    runs-on: ubuntu-latest
    needs: [CI-upgrade]
    environment:
      name: dockerhub
      url: https://hub.docker.com/repository/docker/rafyco/ytrss/general
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
                ${{ secrets.DOCKERHUB_USERNAME }}/ytrss:latest
                ${{ secrets.DOCKERHUB_USERNAME }}/ytrss:${{ needs.CI-upgrade.outputs.git_tag }}
