---
version: 2
# https.//docs.readthedocs.io/en/stable/config-file/v2.html


# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs

sphinx:
  builder: html
  configuration: docs/conf.py
